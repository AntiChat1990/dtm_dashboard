name: Deploy to Server

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0

        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_KEY }}

          script: |
            set -e
            cd ~/dtm_dashboard
            git fetch --all
            git checkout master
            git pull origin master
            cd dtm_dashboard
            npm ci
            npm run build
            pm2 delete dtm_dash || true
            pm2 delete dtm_dashboard || true
            pm2 start npm --name "dtm_dashboard" --cwd ~/dtm_dashboard/dtm_dashboard -- start
            pm2 save
